---
$schema: config_schema.json#
kind: architecture configuration
type: fully configured
name: rv32i-core
description: A single cycle core supporting I extension only
implemented_extensions:
  - { name: I, version: "= 2.1" }
  - { name: Sm, version: "= 1.12.0" }   # not supported by this cpu, but this statement is needed so that MXLEN becomes legal

params:
  # Core width
  MXLEN: 32

  # Identification
  MARCHID_IMPLEMENTED: false
  MIMPID_IMPLEMENTED: false
  VENDOR_ID_BANK: 0
  VENDOR_ID_OFFSET: 0
  CONFIG_PTR_ADDRESS: 0
  # ARCH_ID_VALUE: 1                          Only allowed when MARCHID_IMPLEMENTED == true
  # IMP_ID_VALUE: 0                           Only allowed when MIMPID_IMPLEMENTED == true

  # Physical memory
  PHYS_ADDR_WIDTH: 32
  PMA_GRANULARITY: 3
  NUM_PMP_ENTRIES: 0
  # PMP_GRANULARITY: 2                        Only allowed when NUM_PMP_ENTRIES > 0

  # Misaligned accesses
  MISALIGNED_LDST: false
  MISALIGNED_LDST_EXCEPTION_PRIORITY: low
  # MISALIGNED_MAX_ATOMICITY_GRANULE_SIZE: 4  Only allowed when MISALIGNED_LDST == true
  # MISALIGNED_SPLIT_STRATEGY: "custom"       Only allowed when MISALIGNED_LDST == true

  # Trap / exception behaviour
  PRECISE_SYNCHRONOUS_EXCEPTIONS: true
  TRAP_ON_ECALL_FROM_M: true
  TRAP_ON_EBREAK: true
  TRAP_ON_ILLEGAL_WLRL: false
  TRAP_ON_UNIMPLEMENTED_INSTRUCTION: true
  TRAP_ON_RESERVED_INSTRUCTION: true
  TRAP_ON_UNIMPLEMENTED_CSR: true

  # mtval reporting (keep simple / disabled where possible)
  MTVAL_WIDTH: 32
  REPORT_ENCODING_IN_MTVAL_ON_ILLEGAL_INSTRUCTION: false
  REPORT_VA_IN_MTVAL_ON_BREAKPOINT: false
  REPORT_VA_IN_MTVAL_ON_LOAD_MISALIGNED: false
  REPORT_VA_IN_MTVAL_ON_STORE_AMO_MISALIGNED: false
  REPORT_VA_IN_MTVAL_ON_INSTRUCTION_MISALIGNED: false
  REPORT_VA_IN_MTVAL_ON_LOAD_ACCESS_FAULT: false
  REPORT_VA_IN_MTVAL_ON_STORE_AMO_ACCESS_FAULT: false
  REPORT_VA_IN_MTVAL_ON_INSTRUCTION_ACCESS_FAULT: false

  # mtvec
  MISA_CSR_IMPLEMENTED: false
  MTVEC_ACCESS: rw
  MTVEC_MODES: [0]
  MTVEC_BASE_ALIGNMENT_DIRECT: 4
  # MTVEC_BASE_ALIGNMENT_VECTORED: 4          Only allowed when vectored mode is enabled
  MTVEC_ILLEGAL_WRITE_BEHAVIOR: retain

  # Endianness
  M_MODE_ENDIANNESS: little

  # Performance counters (all disabled)
  HPM_COUNTER_EN: [false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false]
  # HPM_EVENTS: [0]                           Only allowed when at least one HPM counter is enabled
  MCOUNTINHIBIT_IMPLEMENTED: false
  # COUNTINHIBIT_EN: [false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false]
  # Only allowed when MCOUNTINHIBIT_IMPLEMENTED == true
  MCOUNTENABLE_EN: [false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false]